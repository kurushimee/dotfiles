sandbox_mode = "danger-full-access"
approval_policy = "never"

[tui]
status_line = ["model-with-reasoning", "current-dir", "context-used", "five-hour-limit", "weekly-limit", "used-tokens", "task-progress"]
status_line_use_colors = true

[notice]
hide_full_access_warning = true

[features]
terminal_resize_reflow = true

[[skills.config]]
path = "/home/kuru/.codex/skills/.system/imagegen/SKILL.md"
enabled = false

[[skills.config]]
path = "/home/kuru/.codex/skills/.system/openai-docs/SKILL.md"
enabled = false

[[skills.config]]
path = "/home/kuru/.codex/skills/.system/plugin-creator/SKILL.md"
enabled = false

[[skills.config]]
path = "/home/kuru/.codex/skills/.system/skill-creator/SKILL.md"
enabled = false

[[skills.config]]
path = "/home/kuru/.codex/skills/.system/skill-installer/SKILL.md"
enabled = false

[mcp_servers.oracle]
command = "oracle-codex-mcp"
args = []
enabled_tools = ["consult", "continue", "sessions"]
default_tools_approval_mode = "approve"
startup_timeout_sec = 30
tool_timeout_sec = 3600

[mcp_servers.oracle.env]
ORACLE_ENGINE = "browser"
